<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Florist - Best flowers</title>
    <meta name="description" content="Florist - Best flowers in Miyapur, Hyderabad" />

    <style>
        :root {
            --pink: #e91e63;
            --blue: #2196f3;
            --font-family: Arial, sans-serif;
            --bg-color: #fff9fb;
            --text-color: #333;
            --accent-color: var(--pink);
        }
        body {
            margin:0;
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        header {
            background: var(--accent-color);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 {
            font-size: 1.5rem;
            margin: 0;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .hero {
            text-align: center;
            padding: 40px 20px 60px;
            background: linear-gradient(to right, var(--pink), var(--blue));
            color: white;
        }
        .hero img {
            max-width: 90%;
            height: auto;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .section {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .service-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            padding: 20px;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 600;
            color: var(--accent-color);
        }
        .contact {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            margin: 30px auto;
            text-align: center;
            font-size: 1rem;
            line-height: 1.5;
        }
        footer {
            text-align: center;
            font-size: 0.9rem;
            color: #777;
            padding: 15px 20px;
            border-top: 1px solid #ddd;
        }
    </style>

    <script type="application/ld+json">
    {
       "@context": "https://schema.org",
       "@type": "LocalBusiness",
       "name": "Florist",
       "image": "assets/images/flower-shop-interior-exterior-india-1.jpg",
       "address": {
         "@type": "PostalAddress",
         "streetAddress": "Miyapur, Hyderabad"
       },
       "telephone": "+919573855858",
       "email": "karthikpeddi14@gmail.com",
       "openingHours": "Weekdays: 10 AM to 9 PM, weekends: 9AM to 10 PM",
       "description": "Best flowers"
    }
    </script>

</head>
<body>
    <header>
        <h1>Florist</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="pages/about-and-contact.html">About &amp; Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Best flowers</h2>
        <img src="assets/images/flower-shop-interior-exterior-india-1.jpg" alt="Flower shop interior and exterior" />
    </section>

    <section class="section services">
        <h3>Our Services</h3>
        <div class="services-grid">
            <div class="service-card">Flowers for bouquet</div>
        </div>
    </section>

    <section class="section contact">
        <h3>Contact Us</h3>
        <p>Phone: +919573855858</p>
        <p>Email: <a href="mailto:karthikpeddi14@gmail.com">karthikpeddi14@gmail.com</a></p>
        <p>Address: Miyapur, Hyderabad</p>
        <p>Hours: Weekdays: 10 AM to 9 PM, weekends: 9AM to 10 PM</p>
    </section>

    <footer>
        Florist &copy; 2026.<br>
        Photos by Prasoon Srivastav on Unsplash.
    </footer>
</body>
</html>
